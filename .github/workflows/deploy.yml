name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ] # Trigger on every push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push AMD64 Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps
          platforms: linux/amd64 # Ensuring Intel compatibility for EKS
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/raheem-app:v1.0.0

  deploy-to-eks:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update Kubeconfig
        run: aws eks update-kubeconfig --name raheem-eks-cluster --region us-east-1

      - name: Deploy Manifests
        run: |
          kubectl apply -f infrastructure/kubernetes/storage-class.yaml
          kubectl apply -f infrastructure/kubernetes/mysql-pvc.yaml
          kubectl apply -f infrastructure/kubernetes/
          kubectl rollout restart deployment flask-app