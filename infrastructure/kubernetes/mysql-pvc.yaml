apiVersion: v1
kind: Secret
metadata:
  name: mysql-db-password
type: Opaque
data:
  # 'password123' in base64. 
  # Remember: DevSecOps means no plain text passwords in Deployment files!
  password: cGFzc3dvcmQxMjM=
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce # Only one Pod can write to this at a time to prevent data corruption.
  resources:
    requests:
      storage: 1Gi    # Requesting 1 Gigabyte of storage.